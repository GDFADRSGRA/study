<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <title>京东商品列表 - 单个商品项</title>

    <style>
        * {

            margin: 0;

            padding: 0;

        }



        body {

            background-color: #fff;

            font: 12px/1.5 'Microsoft YaHei', 'Heiti SC', tahoma, arial, 'Hiragino Sans GB', "宋体", sans-serif;

            color: #666;

        }



        ul {

            list-style: none;

        }



        a {

            text-decoration: none;

        }



        em {

            font-style: normal;

        }



        .goods {

            position: relative;

            float: left;

            width: 288px;

            height: 458px;

            margin: 20px;

            border: 1px solid #e5e5e5;

            box-sizing: border-box;

        }



        .goods img {

            width: 100%;

            display: block;

        }



        .goods_title {

            font-size: 14px;

            color: #666;

            font-weight: normal;

            padding: 10px;

            height: 40px;

            overflow: hidden;

        }



        .goods_price {

            padding: 0 10px;

            margin: 10px 0;

        }



        .goods_price em {

            font-size: 22px;

            color: #e60012;

        }



        .goods_price del {

            font-size: 14px;

            font-weight: 700;

            color: #a4a4a4;

            margin-left: 8px;

        }



        .goods_progress {

            padding: 0 10px;

            font-size: 12px;

            color: #999;

            margin-bottom: 10px;

        }



        .goods_progress i,

        .goods_progress em {

            color: #f24349;

            font-weight: bold;

        }



        .bar {

            display: inline-block;

            width: 130px;

            height: 10px;

            border: 1px solid #b1191a;

            vertical-align: middle;

            margin: 0 5px;

            border-radius: 5px;

            overflow: hidden;

        }



        .bar_in {

            width: 87%;

            height: 100%;

            background-color: #f24349;

        }



        .goods_buy {

            position: absolute;

            bottom: 0;

            width: 100%;

            height: 50px;

            background-color: #b1191a;

            color: #fff;

            text-align: center;

            line-height: 50px;

            font-size: 20px;

            cursor: pointer;

        }





        .clearfix::after {

            content: "";

            display: table;

            clear: both;

        }
    </style>

</head>

<body>



    <ul class="clearfix">

        <li class="goods">

            <img src="苹果.jpg" alt="iPhone 6s Plus" width="200" height="260">

            <h5 class="goods_title">Apple苹果iPhone 6s Plus（A1699）32G 金色 移动联通电信4G手机</h5>

            <p class="goods_price"><em>¥6088</em> <del>￥6988</del></p>

            <div class="goods_progress">

                已售<i>87%</i>

                <div class="bar">

                    <div class="bar_in"></div>

                </div>

                剩余<em>29</em>件

            </div>

            <a href="#" class="goods_buy">立即抢购</a>

        </li>

    </ul>



</body>

</html>
